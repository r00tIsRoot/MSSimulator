<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MS Simulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="root"></canvas>
    <script>window.addEventListener("unhandledrejection",e=>console.error("<TRACE> UNHANDLED REJECTION:",e.reason?.name||"",e.reason?.message||"",e.reason?.stack||""));window.addEventListener("error",e=>console.error("<TRACE> GLOBAL ERROR:",e.message,e.error?.stack||""));</script>
    <script src="mssimulator.js"></script>
</body>
</html>
